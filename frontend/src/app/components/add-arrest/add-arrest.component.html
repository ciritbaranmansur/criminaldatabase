<div class="page-header">
  <h1><i class="bi bi-plus-circle-fill me-2 text-info"></i>Feature 4 — Add New Arrest</h1>
  <p>Record a new arrest for a specific crime</p>
</div>

<div class="content-body">
  <div class="alert alert-light border mb-3" style="font-size:0.8rem">
    <strong><i class="bi bi-code-slash me-1"></i>SQL Query:</strong>
    <code class="ms-2">INSERT INTO Arrest (...) VALUES (...); INSERT INTO OfficerArrest ...; INSERT INTO SuspectArrest ...</code>
  </div>

  <div class="row">
    <div class="col-md-8">
      <div class="feature-card">
        <h5><i class="bi bi-file-earmark-plus me-2"></i>New Arrest Form</h5>

        <div *ngIf="successMsg" class="alert alert-success">
          <i class="bi bi-check-circle-fill me-2"></i>{{ successMsg }}
        </div>
        <div *ngIf="errorMsg" class="alert alert-danger">
          <i class="bi bi-exclamation-triangle-fill me-2"></i>{{ errorMsg }}
        </div>

        <form [formGroup]="form" (ngSubmit)="submit()">
          <div class="row g-3">

            <div class="col-12">
              <label class="form-label fw-semibold">Crime *</label>
              <select class="form-select" formControlName="crimeId">
                <option value="">— Select Crime —</option>
                <option *ngFor="let c of crimes" [value]="c.crimeId">
                  #{{ c.crimeId }} — {{ c.crimeType }} ({{ c.city }})
                </option>
              </select>
            </div>

            <div class="col-md-6">
              <label class="form-label fw-semibold">Arresting Officer *</label>
              <select class="form-select" formControlName="officerId">
                <option value="">— Select Officer —</option>
                <option *ngFor="let o of officers" [value]="o.officerId">
                  #{{ o.officerId }} — {{ o.officerName }} ({{ o.officerRank }})
                </option>
              </select>
            </div>

            <div class="col-md-6">
              <label class="form-label fw-semibold">Suspect *</label>
              <select class="form-select" formControlName="suspectId">
                <option value="">— Select Suspect —</option>
                <option *ngFor="let s of suspects" [value]="s.suspectId">
                  #{{ s.suspectId }} — {{ s.firstName }} {{ s.lastName }}
                </option>
              </select>
            </div>

            <div class="col-md-6">
              <label class="form-label fw-semibold">Arrest Date *</label>
              <input type="date" class="form-control" formControlName="arrestDate">
            </div>

            <div class="col-12">
              <label class="form-label fw-semibold">Arrest Location *</label>
              <input type="text" class="form-control" formControlName="arrestLocation"
                     placeholder="e.g. Chicago PD Downtown Station">
            </div>

          </div>

          <div class="mt-3">
            <button type="submit" class="btn btn-info text-white" [disabled]="form.invalid || loading">
              <span *ngIf="loading" class="spinner-border spinner-border-sm me-1"></span>
              <i class="bi bi-plus-circle me-1" *ngIf="!loading"></i>
              Add Arrest Record
            </button>
            <button type="button" class="btn btn-outline-secondary ms-2"
                    (click)="form.reset()">Reset</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>

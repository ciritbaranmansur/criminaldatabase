<div class="page-header">
  <h1><i class="bi bi-person-badge-fill me-2 text-primary"></i>Add New Officer</h1>
  <p>Register a new law enforcement officer into the database</p>
</div>

<div class="content-body">
  <div class="row">
    <div class="col-md-8">
      <div class="feature-card">
        <h5><i class="bi bi-person-vcard me-2"></i>Officer Information</h5>

        <div *ngIf="successMsg" class="alert alert-success d-flex align-items-center gap-2">
          <i class="bi bi-check-circle-fill"></i>
          <div>{{ successMsg }} <a routerLink="/officers" class="alert-link">View in Officers list</a></div>
        </div>
        <div *ngIf="errorMsg" class="alert alert-danger">
          <i class="bi bi-exclamation-triangle-fill me-2"></i>{{ errorMsg }}
        </div>

        <form [formGroup]="form" (ngSubmit)="submit()">
          <div class="mb-3">
            <label class="form-label fw-semibold">Officer Name *</label>
            <input type="text" class="form-control" formControlName="officerName" placeholder="e.g. John Smith">
            <div class="text-danger small" *ngIf="form.get('officerName')?.invalid && form.get('officerName')?.touched">
              Officer name is required.
            </div>
          </div>

          <div class="mb-3">
            <label class="form-label fw-semibold">Rank *</label>
            <input type="text" class="form-control" formControlName="officerRank" placeholder="e.g. Detective, Sergeant, Captain">
            <div class="text-danger small" *ngIf="form.get('officerRank')?.invalid && form.get('officerRank')?.touched">
              Rank is required.
            </div>
          </div>

          <div class="mb-4">
            <label class="form-label fw-semibold">Unit *</label>
            <input type="text" class="form-control" formControlName="officerUnit" placeholder="e.g. Homicide Division, Narcotics Unit">
            <div class="text-danger small" *ngIf="form.get('officerUnit')?.invalid && form.get('officerUnit')?.touched">
              Unit is required.
            </div>
          </div>

          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary" [disabled]="form.invalid || loading">
              <span *ngIf="loading" class="spinner-border spinner-border-sm me-1"></span>
              <i class="bi bi-person-plus me-1" *ngIf="!loading"></i>
              Add Officer
            </button>
            <button type="button" class="btn btn-outline-secondary" (click)="reset()">
              <i class="bi bi-arrow-counterclockwise me-1"></i> Reset
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>

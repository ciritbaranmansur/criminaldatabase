<div class="page-header">
  <h1><i class="bi bi-person-plus-fill me-2 text-success"></i>Add New Suspect</h1>
  <p>Register a new suspect into the criminal database</p>
</div>

<div class="content-body">
  <div class="row">
    <div class="col-md-8">
      <div class="feature-card">
        <h5><i class="bi bi-person-vcard me-2"></i>Suspect Information</h5>

        <div *ngIf="successMsg" class="alert alert-success d-flex align-items-center gap-2">
          <i class="bi bi-check-circle-fill"></i>
          <div>{{ successMsg }} <a routerLink="/suspects" class="alert-link">View in Suspects list</a></div>
        </div>
        <div *ngIf="errorMsg" class="alert alert-danger">
          <i class="bi bi-exclamation-triangle-fill me-2"></i>{{ errorMsg }}
        </div>

        <form [formGroup]="form" (ngSubmit)="submit()">
          <div class="row g-3 mb-3">
            <div class="col-md-6">
              <label class="form-label fw-semibold">First Name *</label>
              <input type="text" class="form-control" formControlName="firstName" placeholder="e.g. John">
            </div>
            <div class="col-md-6">
              <label class="form-label fw-semibold">Last Name *</label>
              <input type="text" class="form-control" formControlName="lastName" placeholder="e.g. Doe">
            </div>
          </div>

          <div class="row g-3 mb-3">
            <div class="col-md-6">
              <label class="form-label fw-semibold">Date of Birth *</label>
              <input type="date" class="form-control" formControlName="dateOfBirth">
            </div>
            <div class="col-md-6">
              <label class="form-label fw-semibold">Gender *</label>
              <select class="form-select" formControlName="gender">
                <option value="">— Select —</option>
                <option *ngFor="let g of genderOptions" [value]="g.value">{{ g.label }}</option>
              </select>
            </div>
          </div>

          <div class="mb-3">
            <label class="form-label fw-semibold">National ID *</label>
            <input type="text" class="form-control" formControlName="nationId" placeholder="e.g. TR-123456789">
          </div>

          <div class="row g-3 mb-3">
            <div class="col-md-6">
              <label class="form-label">Height (cm)</label>
              <input type="number" class="form-control" formControlName="heightInCm" placeholder="e.g. 175">
            </div>
            <div class="col-md-6">
              <label class="form-label">Weight (kg)</label>
              <input type="number" class="form-control" formControlName="weightInKg" placeholder="e.g. 75">
            </div>
          </div>

          <div class="row g-3 mb-3">
            <div class="col-md-6">
              <label class="form-label">Eye Color</label>
              <select class="form-select" formControlName="eyeColor">
                <option [value]="null">— Unknown —</option>
                <option *ngFor="let c of eyeColorOptions" [value]="c">{{ c }}</option>
              </select>
            </div>
            <div class="col-md-6">
              <label class="form-label">Hair Color</label>
              <select class="form-select" formControlName="hairColor">
                <option [value]="null">— Unknown —</option>
                <option *ngFor="let c of hairColorOptions" [value]="c">{{ c }}</option>
              </select>
            </div>
          </div>

          <div class="row g-3 mb-4">
            <div class="col-md-6">
              <label class="form-label">Address</label>
              <input type="text" class="form-control" formControlName="adress" placeholder="e.g. 123 Main St, Ankara">
            </div>
            <div class="col-md-6">
              <label class="form-label">Phone</label>
              <input type="text" class="form-control" formControlName="phone" placeholder="e.g. +90-555-1234">
            </div>
          </div>

          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-success" [disabled]="form.invalid || loading">
              <span *ngIf="loading" class="spinner-border spinner-border-sm me-1"></span>
              <i class="bi bi-person-plus me-1" *ngIf="!loading"></i>
              Add Suspect
            </button>
            <button type="button" class="btn btn-outline-secondary" (click)="reset()">
              <i class="bi bi-arrow-counterclockwise me-1"></i> Reset
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>

<div class="page-header">
  <h1><i class="bi bi-person-badge-fill me-2 text-primary"></i>Officers</h1>
  <p>All law enforcement officers in the database</p>
</div>

<div class="content-body">
  <div *ngIf="error" class="alert alert-danger">{{ error }}</div>

  <div *ngIf="loading" class="loading-spinner">
    <div class="spinner-border text-primary"></div>
  </div>

  <div class="table-card" *ngIf="!loading">
    <div class="table-card-header">
      <h5><i class="bi bi-people-fill me-2"></i>Officers ({{ officers.length }})</h5>
    </div>
    <div class="table-responsive">
      <table class="table table-hover mb-0">
        <thead>
          <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Rank</th>
            <th>Unit</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let o of officers">
            <td><span class="badge bg-primary">{{ o.officerId }}</span></td>
            <td><strong>{{ o.officerName }}</strong></td>
            <td><span class="badge bg-info">{{ o.officerRank }}</span></td>
            <td>{{ o.officerUnit }}</td>
          </tr>
          <tr *ngIf="officers.length === 0">
            <td colspan="4" class="text-center text-muted py-4">No officers found.</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
